syntax = "proto3";

package arxiv.v1;

option go_package = "github.com/KushnerykPavel/go-rag-arxiv/gen/arxiv/v1;arxivv1";

// ArxivService provides RAG-based search over ArXiv papers.
service ArxivService {
  // Search retrieves relevant ArXiv papers for a given query.
  rpc Search(SearchRequest) returns (SearchResponse);
  // Ask retrieves an answer grounded in relevant ArXiv papers.
  rpc Ask(AskRequest) returns (AskResponse);
}

message SearchRequest {
  string query = 1;
  int32  limit = 2;
}

message Paper {
  string id      = 1;
  string title   = 2;
  string summary = 3;
  string url     = 4;
  repeated string authors = 5;
}

message SearchResponse {
  repeated Paper papers = 1;
}

message AskRequest {
  string query = 1;
  int32 limit = 2;
}

message Citation {
  string id = 1;
  string title = 2;
  string url = 3;
}

message AskResponse {
  string answer = 1;
  repeated Citation citations = 2;
}
